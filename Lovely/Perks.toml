[manifest]
version = "1.0.0"
priority = 100


#
#
# CREATING PERKS
#
#

[[patches]] # Create the cardArea
    [patches.pattern]
    target = "game.lua"
    pattern = '''
        self.jokers = CardArea(
            0, 0,
            CAI.joker_W,
            CAI.joker_H, 
            {card_limit = self.GAME.starting_params.joker_slots, type = 'joker', highlight_limit = 1, negative_info = 'joker'})
    '''
    position = "after"
    payload = '''
        self.perks = CardArea(
            0, 0,
            CAI.joker_W,
            CAI.joker_H, 
            {card_limit = 8, type = 'joker', highlight_limit = 1, negative_info = 'perk'})
    '''
    match_indent = true

#
#
# OBTAINING PERKS
#
#

[[patches]] # Add nub_PERKSTATE
[patches.pattern]
target = "globals.lua"
pattern = '''
    self.STATES = {    
'''
position = "after"
payload = '''
        PERK = "nub_PERKSTATE",

'''
match_indent = true

[[patches]] # Make cards move away when the perk state is enabled
[patches.pattern]
target = "cardarea.lua"
pattern = '''(self.config.type == 'hand' and ({[G.STATES.SHOP]=1, [G.STATES.TAROT_PACK]=1, [G.STATES.SPECTRAL_PACK]=1, [G.STATES.STANDARD_PACK]=1,[G.STATES.BUFFOON_PACK]=1,[G.STATES.PLANET_PACK]=1, [G.STATES.ROUND_EVAL]=1, [G.STATES.BLIND_SELECT]=1})[state]) or
'''
position = "at"
payload = '''(self.config.type == 'hand' and ({[G.STATES.SHOP]=1, [G.STATES.PERK]=1, [G.STATES.TAROT_PACK]=1, [G.STATES.SPECTRAL_PACK]=1, [G.STATES.STANDARD_PACK]=1,[G.STATES.BUFFOON_PACK]=1,[G.STATES.PLANET_PACK]=1, [G.STATES.ROUND_EVAL]=1, [G.STATES.BLIND_SELECT]=1})[state]) or
'''
match_indent = false

[[patches]] # define screen (scary)
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = ''' 
function G.UIDEF.shop()
'''
position = "before"
payload = '''
function G.UIDEF.perk()
    G.perk_perkArea = CardArea(
      G.hand.T.x+0,
      G.hand.T.y+G.ROOM.T.y + 9,
      math.min(2*1.02*G.CARD_W,4.08*G.CARD_W),
      1.05*G.CARD_H, 
      {card_limit = 2, type = 'shop', highlight_limit = 1, negative_info = true}
    )
      
    local t = {n=G.UIT.ROOT, config = {align = 'cm', w = 9, h = 4, colour = G.C.CLEAR}, nodes={
                {n=G.UIT.C, config={align = "cm", w = 9, h = 4, padding = 0.1, emboss = 0.05, r = 0.1, colour = G.C.DYN_UI.BOSS_MAIN}, nodes={
                    {n=G.UIT.R, config={align = "cm", padding = 0.05, minw = 8, minh = 4}, nodes={
                      {n=G.UIT.C, config={align = "cm", padding = 0.2, r=0.2, colour = G.C.SECONDARY_SET.Spectral, emboss = 0.05, minw = 8, minh = 4}, nodes={

                          {n=G.UIT.R, config={align = "cm", maxw = 7}, nodes={
                            {n=G.UIT.T, config={text = localize('k_loottxt'), font=SMODS.Fonts.nub_ComicSans, scale = 1.3, colour = G.C.WHITE, shadow = true}},
                          }},

                          {n=G.UIT.R, config={align = "cm", maxw = 7, minh = 4}, nodes={
                            {n=G.UIT.O, config={align = "cm", maxh = 1.05*G.CARD_H, object = G.perk_perkArea}},
                          }},

                          {n=G.UIT.R, config={align = "cm", maxw = 1, minh = .5, r=0.15,colour = G.C.FILTER, button = 'skip_perk', hover = true,shadow = true}, nodes = {
                            {n=G.UIT.R, config={align = "cm", padding = 0.07, focus_args = {button = 'x', orientation = 'cr'}, func = 'set_button_pip'}, nodes={
                              {n=G.UIT.R, config={align = "cm"}, nodes={
                                {n=G.UIT.T, config={text = localize('k_skip'), font=SMODS.Fonts.nub_ComicSans, scale = 0.35, colour = G.C.WHITE, shadow = false}},
                              }},
                            }}
                          }},
                            {n=G.UIT.R, config={align = "cm"}, nodes={
                                {n=G.UIT.T, config={text = localize('k_skipsub'), font=SMODS.Fonts.nub_ComicSans, scale = 0.3, colour = G.C.WHITE, shadow = false}},
                            }}

                      }},
                    }},
                }
              },
              }}
    return t
end

'''
match_indent = true

[[patches]] # create the update function for the screen
[patches.pattern]
target = "game.lua"
pattern = ''' 
function Game:update_shop(dt)
    if not G.STATE_COMPLETE then
'''
payload = '''

