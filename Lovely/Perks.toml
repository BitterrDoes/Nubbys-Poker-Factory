        local perk_exists = not not G.perk
        G.perk = UIBox{
            definition = G.UIDEF.perk(),
            config = {align='cm', w = 9, h = 4, offset = {x=0,y=-3.5}, major = G.hand, bond = 'Weak'}
        }
            G.E_MANAGER:add_event(Event({
                func = function()
                    G.E_MANAGER:add_event(Event({
                        trigger = 'after',
                        delay = 0.2,
                        blockable = false,
                        func = function()
                            if math.abs(G.perk.T.y - G.perk.VT.y) < 3 then
                                G.ROOM.jiggle = G.ROOM.jiggle + 3
                                play_sound('cardFan2')
                                local nosave_perk = nil
                                -- if not perk_exists then
                                --     if G.load_perk_perks then 
                                --         nosave_perk = true
                                --         G.perk_perkArea:load(G.load_perk_perks)
                                --         for k, v in ipairs(G.perk_perkArea.cards) do
                                --             create_shop_card_ui(v)
                                --             if v.ability.consumeable then v:start_materialize() end
                                --             for _kk, vvv in ipairs(G.GAME.tags) do
                                --                 if vvv:apply_to_run({type = 'store_joker_modify', card = v}) then break end
                                --             end
                                --         end
                                --         G.load_perk_perks = nil
                                --     else
                                --         for i = 1, 2 - #G.perk_perkArea.cards do
                                --             G.perk_perkArea:emplace(create_card_for_shop(G.perk_perkArea))
                                --         end
                                --     end
                                -- end

                                G.CONTROLLER:snap_to({node = G.perk:get_UIE_by_ID('skip_perk')})
                                if not nosave_perk then G.E_MANAGER:add_event(Event({ func = function() save_run(); return true end})) end
                                return true
                            end
                        end}))
                    return true
                end
            }))
          G.STATE_COMPLETE = true
    end  
    if self.buttons then self.buttons:remove(); self.buttons = nil end          
end
'''
position = "before"
match_indent = true

[[patches]] # Skip button function
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = '''
G.FUNCS.cash_out = function(e)
'''
payload = '''
    G.FUNCS.skip_perk = function(e) 
    stop_use()
    ease_dollars(5)
    G.E_MANAGER:add_event(Event({
        trigger = 'immediate',
        func = function()
        for i = #G.perk_perkArea.cards,1, -1 do
            local c = G.perk_perkArea:remove_card(G.perk_perkArea.cards[i])
            c:remove()
            c = nil
        end
        G.perk:remove()
        G.perk = nil
        G.CONTROLLER.interrupt.focus = false
        G.STATE_COMPLETE = false
        G.STATE = G.STATES.BLIND_SELECT
        G.CONTROLLER.locks.toggle_shop = nil
        G.CONTROLLER:recall_cardarea_focus('perk_perkArea')
        return true
        end
    }))
    G.E_MANAGER:add_event(Event({ func = function() save_run(); return true end}))
    end
'''
position = "before"
match_indent = true

[[patches]] # more make it so screen can pop up
[patches.pattern]
target = "game.lua"
pattern = ''' 
        if self.STATE == self.STATES.SHOP then 
'''
payload = '''
        if self.STATE == self.STATES.PERK then 
            self:update_perk(dt)
        end
        
'''
position = "before"
match_indent = true


[[patches]] # First half of the If _ % _ == 0 statement
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = '''
    G.STATE = G.STATES.SHOP
'''
position = "before"
payload = '''
if G.GAME.round % 5 == 0 then
    G.STATE = G.STATES.PERK
    G.STATE_COMPLETE = false
elseif G.GAME.round % 2 == 0 or (G.GAME.round + 1) % 3 == 0 then
'''
match_indent = true

[[patches]] # Second half of the If _ % _ statement
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = '''
    G.GAME.shop_d6ed = nil
    G.STATE_COMPLETE = false
'''
position = "after"
payload = '''
else
    G.STATE_COMPLETE = false
    G.STATE = G.STATES.BLIND_SELECT
    G.CONTROLLER.locks.toggle_shop = nil
    if G.shop then 
        G.E_MANAGER:add_event(Event({
            trigger = 'immediate',
            func = function()
                G.shop:remove()
                G.shop = nil
                G.SHOP_SIGN:remove()
                G.SHOP_SIGN = nil
                return true
            end
        }))
    end
end
'''
match_indent = true
